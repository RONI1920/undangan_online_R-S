<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Admin Undangan R & S</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #0f0f0f;
            color: #f5f5f5;
            padding: 30px;
        }

        h2 {
            color: #c9a96e;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .box {
            background: #1b1b1b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }

        textarea,
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        textarea {
            background: #222;
            color: #fff;
            min-height: 120px;
            resize: vertical;
        }

        button {
            background: #c9a96e;
            color: #111;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #e2c58a;
        }

        .card {
            margin-top: 20px;
        }

        .item {
            background: #151515;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #2a2a2a;
        }

        .item-title {
            font-weight: 600;
            color: #c9a96e;
            margin-bottom: 10px;
            font-family: "Cardinal", serif;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #222;
            color: #fff;
        }

        small {
            color: #aaa;
        }
    </style>
</head>

<body>

    <h2>📨 Admin Undangan Pernikahan (Multi Guest)</h2>

    <div class="box">
        <small>Masukkan banyak nama (1 baris = 1 tamu)</small>
        <textarea id="listNama" placeholder="Contoh:
Bapak Ahmad
Ibu Siti
Saudara Budi"></textarea>

        <button onclick="generateAll()">Generate Semua Undangan</button>
        <button onclick="copyAllWA()">Copy Semua Pesan WA</button>
        <button onclick="loadDatabase()">Lihat Data Database</button>
    </div>

    <div id="output" class="card"></div>
    <div id="db-output" class="card"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>


</body>

</html>
